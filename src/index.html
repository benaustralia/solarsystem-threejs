<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Solar System</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Orbitron',sans-serif;touch-action:none}
canvas{display:block;position:absolute;z-index:0;touch-action:none}
#ui{position:absolute;inset:0;z-index:1;pointer-events:none}
#title{position:absolute;top:clamp(12px,2vh,24px);left:0;right:0;text-align:center;
  color:rgba(255,255,255,.7);font-size:clamp(11px,1.4vw,18px);letter-spacing:.3em;text-transform:uppercase}
#name{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  color:#fff;font-size:clamp(13px,1.8vw,22px);letter-spacing:.2em;text-transform:uppercase;
  opacity:0;transition:opacity .3s;pointer-events:none}
#hint{position:absolute;bottom:clamp(70px,10vh,100px);left:0;right:0;text-align:center;
  color:rgba(255,255,255,.4);font-size:clamp(9px,1vw,13px);letter-spacing:.2em;text-transform:uppercase}
#btns{position:absolute;bottom:clamp(16px,3vh,32px);left:50%;transform:translateX(-50%);
  display:flex;gap:12px;pointer-events:all}
.tog{display:flex;align-items:center;gap:8px;padding:8px 16px;
  border:1px solid rgba(255,255,255,.3);border-radius:3px;cursor:pointer;
  color:rgba(255,255,255,.7);font-family:'Orbitron',sans-serif;
  font-size:clamp(8px,.9vw,12px);letter-spacing:.12em;text-transform:uppercase;
  background:rgba(0,0,0,.5);user-select:none}
.tog-switch{width:28px;height:14px;border-radius:7px;background:rgba(255,255,255,.2);position:relative}
.tog-switch::after{content:'';position:absolute;left:2px;top:2px;width:10px;height:10px;
  border-radius:50%;background:#fff;transition:transform .3s}
.tog.on .tog-switch{background:rgba(100,200,255,.6)}
.tog.on .tog-switch::after{transform:translateX(14px)}
#detail{position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .4s;
  background:radial-gradient(ellipse at 15% 20%,rgba(0,0,0,.6) 0%,transparent 60%)}
#detail.show{opacity:1}
#detail-info-wrap{padding:clamp(16px,3vh,40px) clamp(16px,3vw,40px);max-width:min(380px,48vw);pointer-events:all}
#detail-name{color:#fff;font-size:clamp(22px,3.5vw,56px);letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px}
#detail-info{color:rgba(255,255,255,.5);font-size:clamp(9px,1vw,15px);letter-spacing:.13em;
  margin-bottom:20px;line-height:1.6;text-transform:uppercase}
#kiki-btn,#back-btn{padding:9px 18px;background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.3);border-radius:3px;color:#fff;
  font-family:'Orbitron',sans-serif;font-size:clamp(9px,.9vw,13px);
  letter-spacing:.1em;text-transform:uppercase;cursor:pointer;display:none;margin-right:8px}
#ts-labels{position:absolute;inset:0;pointer-events:none}
.ts-label{position:absolute;color:rgba(255,255,255,.75);font-size:clamp(7px,.75vw,11px);
  letter-spacing:.15em;text-transform:uppercase;white-space:nowrap;
  transform:translate(-50%,-50%);opacity:0;transition:opacity .5s;pointer-events:none}
#kiki-overlay{position:fixed;inset:0;z-index:100;display:none;pointer-events:none}
#kiki-map{position:absolute;bottom:clamp(60px,8vh,80px);right:clamp(12px,2vw,24px);
  width:min(340px,44vw);height:min(240px,38vh);border:1px solid rgba(255,255,255,.3);
  border-radius:4px;overflow:hidden;pointer-events:all}
#kiki-close{position:absolute;top:clamp(12px,2vh,20px);right:clamp(12px,2vw,20px);
  padding:8px 14px;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.3);
  border-radius:3px;color:#fff;font-family:'Orbitron',sans-serif;font-size:12px;
  letter-spacing:.1em;cursor:pointer;pointer-events:all}
</style></head><body>
<div id="ui">
  <div id="title">Solar System</div>
  <div id="name"></div>
  <div id="hint">Tap any planet to explore</div>
  <div id="btns">
    <div class="tog" id="bSpd" onclick="toggleSpeed()"><span>Fast Orbits</span><div class="tog-switch"></div></div>
    <div class="tog" id="bScl" onclick="toggleScale()"><span>True Scale</span><div class="tog-switch"></div></div>
  </div>
  <div id="detail">
    <div id="detail-info-wrap">
      <div id="detail-name"></div>
      <div id="detail-info"></div>
      <button id="kiki-btn" onclick="openKiki()">Kiki's House</button>
      <button id="back-btn" onclick="closeDetail()">&#8592; Back</button>
    </div>
  </div>
  <div id="ts-labels"></div>
</div>
<div id="kiki-overlay">
  <div id="kiki-map"></div>
  <button id="kiki-close" onclick="closeKiki()">&#x2715; Close</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="main.js"></script>
</body></html>
